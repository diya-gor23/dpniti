<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - 2027 Batch</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --moss:#2C3424;
    --cypress:#4C5B3E;
    --olive:#768064;
    --cedar:#9B9581;
    --aloe:#DADED8;
}

body{
    font-family:'Poppins', sans-serif;
    height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg, #DADED8 0%, #9B9581 100%);
    display:grid;
    grid-template-rows:14vh 34vh 6vh 34vh 12vh;
}

/* ===== HEADER ===== */

.header{
    height:auto;
    background:var(--aloe);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

.header h1{
    font-family:'Playfair Display', serif;
    font-size:2.8rem;
    color:var(--moss);
}

.header p{
    font-size:1rem;
    color:var(--olive);
}

/* ===== SECTION COMMON ===== */

.section{
    height:auto;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6%;
    padding:0 10%;
}

/* ===== DIYA ===== */

.top{
    background:var(--cedar);
}

/* ===== PRACHI ===== */

.bottom{
    background:var(--aloe);
}

/* ===== CONTENT ===== */

.content{
    width:42%;
    max-width:420px;
}

.content h2{
    font-family:'Playfair Display', serif;
    font-size:2rem;
    margin-bottom:10px;
}

.content p{
    margin-bottom:10px;
}

.content strong{
    display:block;
    margin-top:8px;
}

.contact-link{
    color:inherit;
    text-decoration:none;
    transition:color 0.2s ease, text-decoration-color 0.2s ease;
}

.contact-link:hover{
    color:var(--moss);
    text-decoration:underline;
    cursor:pointer;
}

/* ===== BLOB IMAGE ===== */

.image-wrapper{
    width:42%;
    display:flex;
    justify-content:center;
}

.blob{
    width:260px;
    height:260px;
    background:var(--cedar);
    border-radius:60% 40% 55% 45% / 55% 60% 40% 45%;
    display:flex;
    align-items:center;
    justify-content:center;
}

.blob img{
    width:210px;
    height:210px;
    border-radius:50%;
    object-fit:cover;
}

/* ===== WAVE ===== */

.wave{
    height:6vh;
    background:var(--aloe);
}

.wave svg{
    display:block;
    width:100%;
    height:100%;
}

/* ===== BACK BUTTON ===== */

.back-section{
    height:auto;
    background:var(--aloe);
    display:flex;
    align-items:center;
    justify-content:center;
}

.back-btn{
    padding:12px 30px;
    background:var(--moss);
    color:white;
    text-decoration:none;
    border-radius:30px;
    font-weight:500;
}

.back-btn:hover{
    background:var(--cypress);
}

</style>
<link rel="stylesheet" href="dpniti-widget.css">
</head>
<body>

<!-- ===== HEADER ===== -->

<div class="header">
    <h1>Contact Us</h1>
    <p>Get in touch with the coordinators</p>
</div>

<!-- ===== DIYA ===== -->

<div class="section top">

    <div class="content">
        <h2>Diya Gor</h2>
        <strong>Email:</strong> <a class="contact-link" href="mailto:diyagor08@gmail.com">diyagor08@gmail.com</a>
        <strong>Phone:</strong> <a class="contact-link" href="tel:7383854388">7383854388</a>
    </div>

    <div class="image-wrapper">
        <div class="blob">
            <img src="../../diya.jpeg" alt="Diya">
        </div>
    </div>

</div>

<!-- ===== WAVE DIVIDER ===== -->

<div class="wave">
<svg viewBox="0 0 1440 320" preserveAspectRatio="none">
    <path fill="#DADED8"
    d="M0,96L80,112C160,128,320,160,480,170.7C640,181,800,171,960,160C1120,149,1280,139,1360,133.3L1440,128L1440,0L0,0Z">
    </path>
</svg>
</div>

<!-- ===== PRACHI ===== -->

<div class="section bottom">

    <div class="image-wrapper">
        <div class="blob">
            <img src="../../prachi.jpeg" alt="Prachi">
        </div>
    </div>

    <div class="content">
        <h2>Prachi Makwana</h2>
        <strong>Email:</strong> <a class="contact-link" href="mailto:prachimakwana14@gmail.com">prachimakwana14@gmail.com</a>
        <strong>Phone:</strong> <a class="contact-link" href="tel:9328772139">9328772139</a>
    </div>

</div>

<!-- ===== BACK BUTTON ===== -->

<div class="back-section">
    <a href="dashboard.html" class="back-btn">← Back to Dashboard</a>
</div>

</body>
<script src="dpniti-widget.js"></script>
</html>
