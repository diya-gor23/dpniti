<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPortal – Sign In / Sign Up</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <div class="auth-wrapper" id="authWrapper">

        <!-- ───── SIGN UP form (hidden behind overlay initially) ───── -->
        <div class="form-container sign-up-container">
            <form id="signupForm" autocomplete="off">
                <h2>Create Account</h2>
                <p class="form-sub">Sign up with your details</p>

                <div class="field-group">
                    <input type="text"  id="signupName"     placeholder="Full Name"   required>
                    <span class="err" id="suNameErr"></span>
                </div>
                <div class="field-group">
                    <input type="email" id="signupEmail"    placeholder="Email"        required>
                    <span class="err" id="suEmailErr"></span>
                </div>
                <div class="field-group">
                    <input type="password" id="signupPassword" placeholder="Password"  required>
                    <span class="err" id="suPassErr"></span>
                </div>

                <span class="err global-err" id="signupError"></span>
                <div class="success-message" id="signupSuccess"></div>

                <button type="submit" class="btn-action">SIGN UP</button>
            </form>
        </div>

        <!-- ───── SIGN IN form ───── -->
        <div class="form-container sign-in-container">
            <form id="loginForm" autocomplete="off">
                <h2>Sign In</h2>
                <p class="form-sub">Sign in with Email &amp; Password</p>

                <div class="field-group">
                    <input type="text" id="loginName" placeholder="Name" required>
                    <span class="err" id="siNameErr"></span>
                </div>

                <div class="field-group">
                    <input type="email"    id="loginEmail"    placeholder="Email"    required>
                    <span class="err" id="siEmailErr"></span>
                </div>
                <div class="field-group">
                    <input type="password" id="loginPassword" placeholder="Password" required>
                    <span class="err" id="siPassErr"></span>
                </div>

                <a href="#" class="forgot-link">Forgot your password?</a>

                <span class="err global-err" id="loginError"></span>
                <div class="success-message" id="loginSuccess"></div>

                <button type="submit" class="btn-action">SIGN IN</button>
            </form>
        </div>

        <!-- ───── SLIDING OVERLAY ───── -->
        <div class="overlay-container">
            <div class="overlay">

                <!-- Left panel — visible when Sign Up is active -->
                <div class="overlay-panel overlay-left">
                    <h2>Welcome Back!</h2>
                    <p>To keep connected with us please login with your personal info</p>
                    <button class="btn-ghost" id="signInBtn">SIGN IN</button>
                </div>

                <!-- Right panel — visible when Sign In is active -->
                <div class="overlay-panel overlay-right">
                    <h2>Hello, World!</h2>
                    <p>Sign up now and enjoy our site</p>
                    <button class="btn-ghost" id="signUpBtn">SIGN UP</button>
                </div>

            </div>
        </div>
        <!-- ─────────────────────────────────────── -->

    </div><!-- /.auth-wrapper -->

    <script src="script.js?v=3"></script>
</body>
</html>
