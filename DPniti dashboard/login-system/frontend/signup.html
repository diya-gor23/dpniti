<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0;url=index.html#signup">
    <title>Redirecting…</title>
    <script>
        // Open the Sign Up panel on index.html
        window.location.replace('index.html');
        sessionStorage.setItem('openSignup', '1');
    </script>
</head>
<body></body>
</html>
    <div class="container">
        <div class="form-wrapper">
            <div class="form-box">
                <h2>Create Account</h2>
                <p class="form-subtitle">Join us today</p>
                
                <form id="signupForm">
                    <div class="form-group">
                        <label for="signupName">Name</label>
                        <input 
                            type="text" 
                            id="signupName" 
                            name="name" 
                            placeholder="Enter your full name"
                            required
                        >
                        <span class="error-message" id="nameError"></span>
                    </div>

                    <div class="form-group">
                        <label for="signupEmail">Email</label>
                        <input 
                            type="email" 
                            id="signupEmail" 
                            name="email" 
                            placeholder="Enter your email"
                            required
                        >
                        <span class="error-message" id="emailError"></span>
                    </div>

                    <div class="form-group">
                        <label for="signupPassword">Password</label>
                        <input 
                            type="password" 
                            id="signupPassword" 
                            name="password" 
                            placeholder="Enter your password"
                            required
                        >
                        <span class="error-message" id="passwordError"></span>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            name="confirmPassword" 
                            placeholder="Confirm your password"
                            required
                        >
                        <span class="error-message" id="confirmError"></span>
                    </div>

                    <button type="submit" class="btn btn-primary">Sign Up</button>
                </form>

                <div class="form-footer">
                    <span class="error-message" id="signupError"></span>
                    <div class="login-link">
                        <p>Already have an account? <a href="index.html">Login</a></p>
                    </div>
                </div>

                <div class="success-message" id="successMessage"></div>
            </div>
        </div>
    </div>

    <script src="signup.js?v=2"></script>
</body>
</html>
